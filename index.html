<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>デジタルシール手帳</title>
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --c-primary:   #ff6b9d;
      --c-secondary: #ffd93d;
      --c-accent:    #6bcb77;
      --c-bg:        #fff9f0;
      --c-surface:   #ffffff;
      --c-text:      #333333;
      --radius-lg:   20px;
      --radius-md:   12px;
      --shadow:      0 4px 12px rgba(0,0,0,0.12);
    }

    body {
      font-family: 'Hiragino Maru Gothic Pro', 'BIZ UDPGothic', 'Rounded Mplus 1c', sans-serif;
      background: var(--c-bg);
      max-width: 480px;
      margin: 0 auto;
      min-height: 100dvh;
      overflow-x: hidden;
      color: var(--c-text);
    }

    /* ===== SCREEN SYSTEM ===== */
    .screen {
      display: none;
      flex-direction: column;
      min-height: calc(100dvh - 64px);
      padding-bottom: 24px;
    }
    body[data-screen="home"]       #screen-home       { display: flex; }
    body[data-screen="maker"]      #screen-maker      { display: flex; }
    body[data-screen="collection"] #screen-collection { display: flex; }
    body[data-screen="share"]      #screen-share      { display: flex; }

    /* ===== SCREEN HEADER ===== */
    .screen-header {
      background: linear-gradient(135deg, var(--c-primary), #ff8c42);
      padding: 16px 20px 14px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(255,107,157,0.3);
    }
    .screen-header h1 {
      font-size: 1.3rem;
      font-weight: bold;
      color: #ffffff;
      letter-spacing: 0.05em;
    }

    /* ===== PANEL ===== */
    .panel {
      background: var(--c-surface);
      border-radius: var(--radius-lg);
      margin: 8px 12px;
      padding: 14px 16px;
      box-shadow: var(--shadow);
    }
    .panel-label {
      font-size: 0.8rem;
      font-weight: bold;
      color: var(--c-primary);
      margin-bottom: 10px;
      letter-spacing: 0.08em;
    }

    /* ===== MAKER: PREVIEW + DRAW OVERLAY ===== */
    /* CSS Grid で preview-canvas(下)と draw-canvas(上)を同セルに重ねる */
    .canvas-stack {
      display: grid;
      position: relative;      /* confirm-dialog の position:absolute 基点 */
      width: min(300px, calc(100vw - 56px));
      margin: 0 auto;
      border-radius: var(--radius-lg);
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }
    .canvas-stack > canvas {
      grid-area: 1 / 1;        /* 同セルに重ねる（CSS Grid モダン手法） */
      display: block;
      width: 100%;
      aspect-ratio: 1;
    }
    #preview-canvas {
      pointer-events: none;    /* タッチを上の draw-canvas に通す */
    }

    /* ===== MAKER: SHAPES ===== */
    .shape-grid {
      display: flex;
      gap: 10px;
      justify-content: space-around;
    }
    .shape-btn {
      width: 60px;
      height: 60px;
      border: 3px solid #e0e0e0;
      border-radius: var(--radius-md);
      font-size: 1.8rem;
      background: #f5f5f5;
      cursor: pointer;
      transition: transform 0.1s, border-color 0.1s, background 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .shape-btn:active { transform: scale(0.95); }
    .shape-btn.active {
      border-color: var(--c-primary);
      background: #fff0f6;
      transform: scale(1.08);
    }

    /* ===== MAKER: COLORS ===== */
    .color-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 6px;
    }
    .color-swatch {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: transform 0.1s, border-color 0.1s;
    }
    .color-swatch:active { transform: scale(0.9); }
    .color-swatch.active {
      border-color: #333;
      transform: scale(1.2);
      box-shadow: 0 0 0 2px #fff, 0 0 0 4px #333;
    }

    /* ===== MAKER: STAMPS ===== */
    .stamp-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 6px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .stamp-scroll::-webkit-scrollbar { display: none; }
    .stamp-btn {
      flex-shrink: 0;
      width: 52px;
      height: 52px;
      font-size: 1.7rem;
      border: 3px solid transparent;
      border-radius: var(--radius-md);
      background: #f5f5f5;
      cursor: pointer;
      transition: transform 0.1s, border-color 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .stamp-btn:active { transform: scale(0.9); }
    .stamp-btn.active {
      border-color: var(--c-primary);
      background: #fff0f6;
    }
    .stamp-none { font-size: 1.2rem; color: #999; }

    /* スタンプ配置ボタン行（スタンプ選択時のみ表示） */
    .stamp-place-row { margin-top: 10px; }
    .stamp-place-row[hidden] { display: none; }
    .stamp-place-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      height: 48px;
      padding: 0 16px;
      font-size: 1rem;
      font-family: inherit;
      font-weight: bold;
      border: 3px solid #e0e0e0;
      border-radius: var(--radius-md);
      background: #f5f5f5;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s, transform 0.08s;
    }
    .stamp-place-btn.active {
      border-color: var(--c-primary);
      background: #fff0f6;
      color: var(--c-primary);
    }
    .stamp-place-btn:active { transform: scale(0.98); }

    /* ===== MAKER: TEXT INPUT ===== */
    #sticker-text {
      width: 100%;
      padding: 12px 14px;
      font-size: 1.1rem;
      font-family: inherit;
      border: 3px solid #e0e0e0;
      border-radius: var(--radius-md);
      outline: none;
      transition: border-color 0.15s;
      background: #fafafa;
    }
    #sticker-text:focus {
      border-color: var(--c-primary);
      background: #fff;
    }

    /* ===== MAKER: DRAWING ===== */

    /* ツールバー 2行構成 */
    .draw-toolbar-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .draw-toolbar-row--tools { justify-content: space-between; }

    /* ペンサイズ 3段階ボタン */
    .pen-size-group { display: flex; gap: 6px; align-items: center; }
    .pen-size-btn {
      width: 52px;
      height: 52px;
      border: 3px solid #e0e0e0;
      border-radius: 14px;
      background: #f5f5f5;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.1s, background 0.1s, transform 0.08s;
      flex-shrink: 0;
    }
    .pen-size-btn.active {
      border-color: var(--c-primary);
      background: #fff0f6;
      transform: scale(1.1);
    }
    .pen-size-btn:active { transform: scale(0.93); }
    .pen-dot {
      display: block;
      border-radius: 50%;
      background: #333;
    }

    /* アクションボタン群 */
    .draw-action-group { display: flex; gap: 6px; }
    .tool-btn {
      width: 48px;
      height: 48px;
      padding: 0;
      font-size: 1.3rem;
      font-family: inherit;
      font-weight: bold;
      border: 3px solid #e0e0e0;
      border-radius: var(--radius-md);
      background: #f5f5f5;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, border-color 0.1s, transform 0.08s;
      flex-shrink: 0;
    }
    .tool-btn.active {
      border-color: var(--c-primary);
      background: #fff0f6;
      color: var(--c-primary);
    }
    .tool-btn:active { transform: scale(0.93); }
    .tool-btn:disabled { opacity: 0.35; pointer-events: none; }

    /* 全消しは赤系で破壊的操作を示す */
    #btn-clear-draw { border-color: #ffb3b3; background: #fff5f5; }
    #btn-clear-draw:active { background: #ffe0e0; }

    /* ペン色スウォッチ行（行2） */
    .draw-color-row {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-bottom: 12px;
      justify-content: center;
    }
    .draw-color-row .color-swatch {
      width: 34px;
      height: 34px;
      flex-shrink: 0;
    }

    #draw-canvas {
      touch-action: none;      /* iOS スクロール防止（必須） */
      cursor: crosshair;
      /* 背景は透明（デフォルト）→ preview-canvas が透けて見える */
    }
    #draw-canvas.eraser-mode      { cursor: cell; }
    #draw-canvas.stamp-place-mode { cursor: move; }
    #draw-canvas.text-place-mode  { cursor: move; }

    /* 全消し確認ダイアログ */
    .confirm-dialog {
      position: absolute;
      bottom: calc(100% + 6px);
      right: 0;
      background: #fff;
      border: 3px solid #ffb3b3;
      border-radius: 16px;
      padding: 14px 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      text-align: center;
      font-size: 1rem;
      z-index: 10;
      min-width: 150px;
      line-height: 1.6;
    }
    .confirm-dialog[hidden] { display: none; }
    .confirm-btns { display: flex; gap: 10px; margin-top: 10px; justify-content: center; }
    .confirm-yes {
      padding: 10px 18px; background: #ff6b6b; color: #fff;
      border: none; border-radius: 10px; font-size: 1rem;
      font-family: inherit; font-weight: bold; cursor: pointer;
    }
    .confirm-no {
      padding: 10px 18px; background: #e0e0e0; color: #333;
      border: none; border-radius: 10px; font-size: 1rem;
      font-family: inherit; font-weight: bold; cursor: pointer;
    }

    /* ===== MAKER: SAVE ===== */
    .panel-save { padding: 8px 12px 12px; }
    .save-btn {
      width: 100%;
      padding: 18px;
      font-size: 1.25rem;
      font-weight: bold;
      font-family: inherit;
      background: linear-gradient(135deg, var(--c-primary), #ff8c42);
      color: #fff;
      border: none;
      border-radius: var(--radius-lg);
      box-shadow: 0 6px 0 #c04c77;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .save-btn:active {
      transform: translateY(3px);
      box-shadow: 0 3px 0 #c04c77;
    }

    /* ===== BOTTOM NAV ===== */
    #bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      height: 64px;
      background: #fff;
      display: flex;
      border-top: 2px solid #f0e0e0;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
      z-index: 100;
    }
    .nav-btn {
      flex: 1;
      font-size: 1.6rem;
      border: none;
      background: transparent;
      cursor: pointer;
      opacity: 0.35;
      transition: opacity 0.15s, transform 0.1s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 0;
    }
    .nav-btn span.nav-label {
      font-size: 0.6rem;
      font-family: inherit;
      color: #999;
    }
    .nav-btn.active {
      opacity: 1;
      transform: translateY(-2px);
    }
    .nav-btn.active .nav-label { color: var(--c-primary); }

    /* ===== PLACEHOLDER SCREENS ===== */
    .placeholder-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 16px;
      color: #bbb;
      padding: 40px;
      text-align: center;
    }
    .placeholder-screen .placeholder-icon { font-size: 4rem; }
    .placeholder-screen p { font-size: 1rem; }

    /* ===== HOME: NOTEBOOK PAGE ===== */
    #screen-home { padding-bottom: 0; }

    #notebook-page {
      flex: 1;
      position: relative;
      overflow: hidden;
      margin: 10px 12px 8px;
      border-radius: var(--radius-lg);
      box-shadow: 0 4px 20px rgba(0,0,0,0.10);
      background-color: #fffef7;
      background-image: radial-gradient(circle, #d8c9a3 1px, transparent 1px);
      background-size: 22px 22px;
      background-position: 11px 11px;
    }
    #notebook-page::before {
      content: '';
      position: absolute;
      left: 36px;
      top: 0; bottom: 0;
      width: 2px;
      background: rgba(220, 130, 130, 0.3);
      z-index: 0;
      pointer-events: none;
    }

    /* ===== HOME: STICKER TRAY ===== */
    .sticker-tray-wrap {
      flex-shrink: 0;
      padding: 10px 12px 12px;
      background: var(--c-surface);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
    }
    .tray-label {
      font-size: 0.75rem;
      font-weight: bold;
      color: var(--c-primary);
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }
    .sticker-tray {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      min-height: 60px;
      align-items: center;
    }
    .sticker-tray::-webkit-scrollbar { display: none; }
    .tray-sticker {
      flex-shrink: 0;
      width: 56px;
      height: 56px;
      border-radius: 10px;
      border: 3px solid #e8e8e8;
      cursor: pointer;
      object-fit: cover;
      transition: transform 0.1s, border-color 0.1s;
    }
    .tray-sticker:active {
      transform: scale(0.88);
      border-color: var(--c-primary);
    }
    .tray-empty {
      font-size: 0.85rem;
      color: #bbb;
      line-height: 1.6;
      flex: 1;
    }

    /* ===== HOME: PLACED STICKER ===== */
    .placed-sticker {
      position: absolute;
      width: 80px;
      height: 80px;
      cursor: move;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      z-index: 2;
      transform-origin: center center;
    }
    .placed-sticker img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      display: block;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.25));
    }
    .placed-sticker.selected {
      outline: 3px dashed var(--c-primary);
      outline-offset: 3px;
      z-index: 5;
    }
    .placed-sticker-del {
      position: absolute;
      top: -12px;
      right: -12px;
      width: 28px;
      height: 28px;
      background: #ff6b6b;
      color: white;
      border: 2px solid white;
      border-radius: 50%;
      font-size: 0.75rem;
      font-weight: bold;
      font-family: inherit;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      z-index: 6;
    }
    .placed-sticker.selected .placed-sticker-del { display: flex; }

    /* ===== COLLECTION ===== */
    #collection-grid-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      -webkit-overflow-scrolling: touch;
    }
    #collection-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .collection-sticker {
      position: relative;
      aspect-ratio: 1;
      cursor: pointer;
      border-radius: 12px;
      transition: transform 0.1s;
    }
    .collection-sticker img {
      width: 100%;
      height: 100%;
      border-radius: 12px;
      object-fit: cover;
      box-shadow: 0 3px 10px rgba(0,0,0,0.15);
      display: block;
    }
    .collection-sticker:active { transform: scale(0.94); }
    .collection-sticker.selected img {
      outline: 3px dashed var(--c-primary);
      outline-offset: 2px;
    }
    .collection-sticker-del {
      position: absolute;
      top: -10px;
      right: -10px;
      width: 28px;
      height: 28px;
      background: #ff6b6b;
      color: white;
      border: 2px solid white;
      border-radius: 50%;
      font-size: 0.75rem;
      font-weight: bold;
      font-family: inherit;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      z-index: 2;
    }
    .collection-sticker.selected .collection-sticker-del { display: flex; }

    /* 削除確認ダイアログ */
    .collection-dialog {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .collection-dialog[hidden] { display: none; }
    .collection-dialog-inner {
      background: white;
      border-radius: 20px;
      padding: 24px 20px;
      text-align: center;
      width: min(280px, 80vw);
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    }
    .collection-dialog-inner img {
      width: 80px;
      height: 80px;
      border-radius: 12px;
      margin-bottom: 12px;
    }
    .collection-dialog-inner p {
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 16px;
    }
    .collection-dialog-btns { display: flex; gap: 10px; justify-content: center; }

    /* 空状態 */
    #collection-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 60px 20px;
      color: #bbb;
      text-align: center;
    }
    #collection-empty[hidden] { display: none; }
    #collection-empty .placeholder-icon { font-size: 4rem; }
    #collection-empty p { font-size: 1rem; line-height: 1.6; }

    /* ===== SAVE SUCCESS OVERLAY ===== */
    .save-success-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 999;
      animation: fadeInOut 1.8s ease forwards;
    }
    .save-success-overlay .success-img {
      width: 160px;
      height: 160px;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      animation: bounceIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .save-success-overlay p {
      color: #fff;
      font-size: 1.4rem;
      font-weight: bold;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
    @keyframes fadeInOut {
      0%   { opacity: 0; }
      15%  { opacity: 1; }
      70%  { opacity: 1; }
      100% { opacity: 0; }
    }
    @keyframes bounceIn {
      from { transform: scale(0.3); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
  </style>
</head>
<body data-screen="maker">

  <!-- ===== HOME SCREEN (Phase 2) ===== -->
  <div id="screen-home" class="screen">
    <header class="screen-header"><h1>📖 シール手帳</h1></header>
    <!-- 手帳ページ（貼り付けエリア） -->
    <div id="notebook-page">
      <!-- 貼られたシールが JS で挿入される -->
    </div>
    <!-- シールトレイ -->
    <div class="sticker-tray-wrap">
      <p class="tray-label">✨ シールをえらんでタップしてね</p>
      <div class="sticker-tray" id="sticker-tray"></div>
    </div>
  </div>

  <!-- ===== MAKER SCREEN (Phase 1) ===== -->
  <div id="screen-maker" class="screen">
    <header class="screen-header"><h1>✏️ シールをつくろう！</h1></header>
    <main class="maker-main">

      <!-- Shape -->
      <section class="panel panel-shapes">
        <p class="panel-label">かたち</p>
        <div class="shape-grid">
          <button class="shape-btn active" data-shape="circle"
                  aria-label="まる">●</button>
          <button class="shape-btn" data-shape="star"
                  aria-label="ほし">★</button>
          <button class="shape-btn" data-shape="heart"
                  aria-label="はーと">♥</button>
          <button class="shape-btn" data-shape="square"
                  aria-label="しかく">■</button>
        </div>
      </section>

      <!-- Color -->
      <section class="panel panel-colors">
        <p class="panel-label">いろ</p>
        <div class="color-grid" id="color-palette"></div>
      </section>

      <!-- Stamps -->
      <section class="panel panel-stamps">
        <p class="panel-label">スタンプ</p>
        <div class="stamp-scroll" id="stamp-picker"></div>
        <div id="stamp-place-row" class="stamp-place-row" hidden>
          <button class="stamp-place-btn" id="btn-stamp-place" aria-label="スタンプをうごかす">
            🎯 いちをきめる
          </button>
        </div>
      </section>

      <!-- Text -->
      <section class="panel panel-text">
        <p class="panel-label">もじ</p>
        <input type="text" id="sticker-text" maxlength="12"
               placeholder="ことばをいれてね">
        <div id="text-place-row" class="stamp-place-row" hidden>
          <button class="stamp-place-btn" id="btn-text-place" aria-label="もじのいちをきめる">
            🎯 いちをきめる
          </button>
        </div>
      </section>

      <!-- Drawing -->
      <section class="panel panel-draw">
        <p class="panel-label">おえかき</p>

        <!-- 行1: ペンサイズ + アクションボタン -->
        <div class="draw-toolbar-row draw-toolbar-row--tools">
          <div class="pen-size-group" id="pen-size-group">

      ⭐<span class="nav-label">コレクション</span>

  <!-- CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

  <script>
    'use strict';

    /* ===== CONSTANTS ===== */

    const COLOR_PALETTE = [
      '#ff6b9d', '#ff8c42', '#ffd93d', '#6bcb77',
      '#4ecdc4', '#45b7d1', '#96ceb4', '#dda0dd',
      '#ff9ff3', '#54a0ff', '#5f27cd', '#ee5a24',
      '#ffffff', '#f0f0f0', '#888888', '#222222'
    ];

    // ペン専用カラー（黒を先頭に、子どもが描きやすい16色）
    const PEN_COLORS = [
      '#222222', '#ee5a24', '#ff6b9d', '#ffd93d',
      '#6bcb77', '#45b7d1', '#5f27cd', '#ff9ff3',
      '#ff8c42', '#4ecdc4', '#54a0ff', '#96ceb4',
      '#dda0dd', '#ffffff', '#f0f0f0', '#888888'
    ];

    const STAMP_LIST = [
      '⭐','🌟','💖','🌈','🦄','🐱','🐶','🐰',
      '🎀','🍎','🍓','🍭','🎂','🎈','🎵','🌸',
      '🌺','🦋','🐸','🍀','☀️','🌙','❄️','🔥'
    ];

    /* ===== STATE ===== */

    const state = {
      shape:       'circle',
      bgColor:     '#ff6b9d',
      stamp:       null,
      stickerText: '',
      penColor:    '#222222', // 黒がデフォルト（子どもが描きやすい）
      penSize:     10,        // ふつうサイズをデフォルトに
      eraserMode:  false,
      eraserSize:  16,        // 消しゴム専用サイズ
      undoStack:   [],        // ImageData[] アンドゥ履歴
      redoStack:   [],        // ImageData[] リドゥ履歴
      stampX:      150,       // スタンプ中心 X（canvas座標 0-300）
      stampY:      150,       // スタンプ中心 Y（canvas座標 0-300）
      stampPlaceMode: false,  // スタンプ配置モード中か
      textX:       150,       // テキスト中心 X（canvas座標 0-300）
      textY:       230,       // テキスト中心 Y（canvas座標 0-300）
      textPlaceMode: false,   // テキスト配置モード中か
    };

    /* ===== STORAGE ===== */

    const STORAGE_KEY = 'stickerNotebook_stickers';

    const StickerStorage = {
      getAll() {
        try {
          return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        } catch {
          return [];
        }
      },

      save(imageData) {
        const sticker = {
          id:        'sticker_' + Date.now().toString(36),
          createdAt: new Date().toISOString(),
          source:    'self',
          imageData,
        };
        try {
          const all = this.getAll();
          all.unshift(sticker);
          localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
        } catch (e) {
          if (e.name === 'QuotaExceededError') {
            return null;
          }
          throw e;
        }
        return sticker;
      },

      delete(id) {
        const filtered = this.getAll().filter(s => s.id !== id);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(filtered));
      },
    };

    /* ===== PAGE STORAGE (Phase 2) ===== */

    const PAGE_KEY = 'stickerNotebook_page';

    const PageStorage = {
      getAll() {
        try { return JSON.parse(localStorage.getItem(PAGE_KEY) || '[]'); } catch { return []; }
      },
      saveAll(items) {
        try { localStorage.setItem(PAGE_KEY, JSON.stringify(items)); } catch {}
      },
      add(imageData, x, y, rotation) {
        const item = {
          id: 'p_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5),
          imageData, x, y, rotation,
        };
        const items = this.getAll();
        items.push(item);
        this.saveAll(items);
        return item;
      },
      remove(id) {
        this.saveAll(this.getAll().filter(i => i.id !== id));
      },
      updatePos(id, x, y) {
        this.saveAll(this.getAll().map(i => i.id === id ? { ...i, x, y } : i));
      },
    };

    /* ===== SHAPE RENDERER ===== */

    const ShapeRenderer = {
      // パスを描くだけ（clip しない）— border 描画と clip 描画で共用
      buildPath(ctx, cx, cy, r, shape) {
        ctx.beginPath();
        switch (shape) {
          case 'circle':
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            break;

          case 'square': {
            // 角丸 8px 固定（スタンプらしい角）
            const cr = Math.min(r * 0.08, 8);
            ctx.moveTo(cx - r + cr, cy - r);
            ctx.lineTo(cx + r - cr, cy - r);
            ctx.quadraticCurveTo(cx + r, cy - r, cx + r, cy - r + cr);
            ctx.lineTo(cx + r, cy + r - cr);
            ctx.quadraticCurveTo(cx + r, cy + r, cx + r - cr, cy + r);
            ctx.lineTo(cx - r + cr, cy + r);
            ctx.quadraticCurveTo(cx - r, cy + r, cx - r, cy + r - cr);
            ctx.lineTo(cx - r, cy - r + cr);
            ctx.quadraticCurveTo(cx - r, cy - r, cx - r + cr, cy - r);
            ctx.closePath();
            break;
          }

          case 'heart': {
            // 6セグメント対称ベジェ
            // バウンディングボックス (cx±r, cy±r) の全4辺に接する
            // 谷(valley): (cx, cy-r*0.55) — 上中央のくびれ
            // 左ローブ頂点: (cx-r*0.5, cy-r) — 上辺に接触
            // 左端点: (cx-r, cy-r*0.35) — 左辺に接触
            // 先端(tip): (cx, cy+r) — 下辺に接触（右側は鏡像）
            ctx.moveTo(cx, cy - r * 0.55);

            // 谷 → 左ローブ頂点（接線が水平になるよう ctrl を上辺に揃える）
            ctx.bezierCurveTo(
              cx - r * 0.1,  cy - r,
              cx - r * 0.4,  cy - r,
              cx - r * 0.5,  cy - r
            );
            // 左ローブ頂点 → 左端点（上辺から縦方向へ滑らかに）
            ctx.bezierCurveTo(
              cx - r * 0.65, cy - r,
              cx - r,        cy - r * 0.65,
              cx - r,        cy - r * 0.35
            );
            // 左端点 → 先端（V字の左斜面）
            ctx.bezierCurveTo(
              cx - r,        cy + r * 0.5,
              cx - r * 0.1,  cy + r * 0.8,
              cx,            cy + r
            );
            // 先端 → 右端点（V字の右斜面・左の鏡像）
            ctx.bezierCurveTo(
              cx + r * 0.1,  cy + r * 0.8,
              cx + r,        cy + r * 0.5,
              cx + r,        cy - r * 0.35
            );
            // 右端点 → 右ローブ頂点
            ctx.bezierCurveTo(
              cx + r,        cy - r * 0.65,
              cx + r * 0.65, cy - r,
              cx + r * 0.5,  cy - r
            );
            // 右ローブ頂点 → 谷（左の鏡像）
            ctx.bezierCurveTo(
              cx + r * 0.4,  cy - r,
              cx + r * 0.1,  cy - r,
              cx,            cy - r * 0.55
            );
            ctx.closePath();
            break;
          }

          case 'star': {
            const outerR = r;
            const innerR = r * 0.46;
            const n      = 5;
            const startA = -Math.PI / 2;

            // 10頂点を生成（偶数=外側, 奇数=内側）
            const verts = [];
            for (let i = 0; i < n * 2; i++) {
              const rad   = i % 2 === 0 ? outerR : innerR;
              const angle = startA + (i * Math.PI) / n;
              verts.push([cx + rad * Math.cos(angle), cy + rad * Math.sin(angle)]);
            }

            const N = verts.length;
            const crOuter = r * 0.22; // 外側先端の丸み
            const crInner = r * 0.10; // 内側くびれの丸み

            for (let i = 0; i < N; i++) {
              const [x,  y]  = verts[i];
              const [px, py] = verts[(i - 1 + N) % N];
              const [nx, ny] = verts[(i + 1) % N];
              const cr = i % 2 === 0 ? crOuter : crInner;

              // prev / next 方向の単位ベクトル
              const dpLen = Math.hypot(px - x, py - y);
              const unxP = (px - x) / dpLen, unyP = (py - y) / dpLen;
              const dnLen = Math.hypot(nx - x, ny - y);
              const unxN = (nx - x) / dnLen, unyN = (ny - y) / dnLen;

              // 各頂点の手前と先に丸みの始点・終点を置く
              const ex = x + unxP * cr, ey = y + unyP * cr;
              const fx = x + unxN * cr, fy = y + unyN * cr;

              if (i === 0) ctx.moveTo(ex, ey);
              else         ctx.lineTo(ex, ey);

              // 頂点を制御点とした二次ベジェで角を丸める
              ctx.quadraticCurveTo(x, y, fx, fy);
            }
            ctx.closePath();
            break;
          }
        }
      },

      clipToShape(ctx, cx, cy, r, shape) {
        this.buildPath(ctx, cx, cy, r, shape);
        ctx.clip();
      },
    };

    /* ===== DRAWING PAD ===== */

    const DrawingPad = {
      canvas:         null,
      ctx:            null,
      isDrawing:      false,
      lastX:          0,
      lastY:          0,
      MAX_UNDO:       20,
      activePointers: new Set(), // タッチ中のポインターID（2点タッチ防止用）

      init() {
        this.canvas = document.getElementById('draw-canvas');
        this.ctx    = this.canvas.getContext('2d');
        this.ctx.lineCap  = 'round';
        this.ctx.lineJoin = 'round';

        this.canvas.addEventListener('pointerdown', e => this._onDown(e));
        this.canvas.addEventListener('pointermove', e => this._onMove(e));
        this.canvas.addEventListener('pointerup',   e => this._onUp(e));
        this.canvas.addEventListener('pointerout',  e => this._onUp(e));
        this.canvas.addEventListener('touchstart',  e => e.preventDefault(), { passive: false });
      },

      _getPos(e) {
        const rect   = this.canvas.getBoundingClientRect();
        const scaleX = this.canvas.width  / rect.width;
        const scaleY = this.canvas.height / rect.height;
        return {
          x: (e.clientX - rect.left) * scaleX,
          y: (e.clientY - rect.top)  * scaleY,
        };
      },

      _applyPenSettings() {
        const ctx = this.ctx;
        ctx.globalCompositeOperation = 'source-over';
        if (state.eraserMode) {
          ctx.strokeStyle = '#ffffff'; // 白で上書き（透明穴ではなく自然な消去）
          ctx.lineWidth   = state.eraserSize;
        } else {
          ctx.strokeStyle = state.penColor;
          ctx.lineWidth   = state.penSize;
        }
      },

      // ストローク開始前にスナップショットをアンドゥスタックへ保存
      _saveSnapshot() {
        const img = this.ctx.getImageData(0, 0, this.canvas.width, this.canvas.height);
        state.undoStack.push(img);
        if (state.undoStack.length > this.MAX_UNDO) state.undoStack.shift();
        state.redoStack = [];
        updateUndoRedoButtons();
      },

      undo() {
        if (state.undoStack.length === 0) return;
        const current = this.ctx.getImageData(0, 0, this.canvas.width, this.canvas.height);
        state.redoStack.push(current);
        const prev = state.undoStack.pop();
        this.ctx.putImageData(prev, 0, 0);
        PreviewRenderer.render();
        updateUndoRedoButtons();
      },

      redo() {
        if (state.redoStack.length === 0) return;
        const current = this.ctx.getImageData(0, 0, this.canvas.width, this.canvas.height);
        state.undoStack.push(current);
        const next = state.redoStack.pop();
        this.ctx.putImageData(next, 0, 0);
        PreviewRenderer.render();
        updateUndoRedoButtons();
      },

      _onDown(e) {
        e.preventDefault();
        if (e.pointerType === 'touch' && e.width > 80) return;

        // 2点タッチ防止: タッチが2本以上になったら現在のストロークを中断
        if (e.pointerType === 'touch') {
          this.activePointers.add(e.pointerId);
          if (this.activePointers.size > 1) {
            this.isDrawing = false;
            return;
          }
        }

        this.canvas.setPointerCapture(e.pointerId);
        this.isDrawing = true;
        const pos = this._getPos(e);

        // スタンプ配置モード: 描画せずスタンプ位置だけ更新
        if (state.stampPlaceMode) {
          state.stampX = pos.x;
          state.stampY = pos.y;
          PreviewRenderer.render();
          return;
        }

        // テキスト配置モード: 描画せずテキスト位置だけ更新
        if (state.textPlaceMode) {
          state.textX = pos.x;
          state.textY = pos.y;
          PreviewRenderer.render();
          return;
        }

        this._saveSnapshot();
        this.lastX = pos.x;
        this.lastY = pos.y;

        // タップ（移動なし）のドット描画
        this._applyPenSettings();
        const ctx = this.ctx;
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, (state.eraserMode ? state.eraserSize : state.penSize) / 2, 0, Math.PI * 2);
        ctx.fillStyle = state.eraserMode ? '#ffffff' : state.penColor;
        ctx.fill();
        PreviewRenderer.render();
      },

      _onMove(e) {
        if (!this.isDrawing) return;
        e.preventDefault();
        const pos = this._getPos(e);

        // スタンプ配置モード: ドラッグでスタンプをリアルタイム移動
        if (state.stampPlaceMode) {
          state.stampX = pos.x;
          state.stampY = pos.y;
          PreviewRenderer.render();
          return;
        }

        // テキスト配置モード: ドラッグでテキストをリアルタイム移動
        if (state.textPlaceMode) {
          state.textX = pos.x;
          state.textY = pos.y;
          PreviewRenderer.render();
          return;
        }

        const ctx = this.ctx;
        this._applyPenSettings();
        ctx.beginPath();
        ctx.moveTo(this.lastX, this.lastY);
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();

        this.lastX = pos.x;
        this.lastY = pos.y;
        PreviewRenderer.render();
      },

      _onUp(e) {
        if (e.pointerType === 'touch') this.activePointers.delete(e.pointerId);
        this.isDrawing = false;
        this.ctx.globalCompositeOperation = 'source-over';
        if (state.stampPlaceMode) exitStampPlaceMode();
        if (state.textPlaceMode)  exitTextPlaceMode();
      },

      clear() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        state.undoStack = [];
        state.redoStack = [];
        updateUndoRedoButtons();
        PreviewRenderer.render();
      },
    };

    /* ===== PREVIEW RENDERER ===== */

    const PreviewRenderer = {
      canvas:     null,
      ctx:        null,
      drawCanvas: null,

      init() {
        this.canvas     = document.getElementById('preview-canvas');
        this.ctx        = this.canvas.getContext('2d');
        this.drawCanvas = document.getElementById('draw-canvas');
      },

      render() {
        const ctx = this.ctx;
        const W   = this.canvas.width;
        const H   = this.canvas.height;
        const cx  = W / 2;
        const cy  = H / 2;
        // r=136: 形状が 300px キャンバスの端近くまで広がり余白を最小化
        // 2px ボーダーを含めても端まで 12px の余裕を保つ
        const r   = 136;

        ctx.clearRect(0, 0, W, H);

        // Layer 0: white base
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, W, H);

        // Border: 形状アウトラインの +2px コンター（lineWidth=4 の外側半分）
        ctx.save();
        ShapeRenderer.buildPath(ctx, cx, cy, r, state.shape);
        ctx.strokeStyle = 'rgba(0,0,0,0.2)';
        ctx.lineWidth   = 4;
        ctx.stroke();
        ctx.restore();

        // Layer 1: shape + bg color（内側 2px のボーダーを覆い隠す）
        ctx.save();
        ShapeRenderer.clipToShape(ctx, cx, cy, r, state.shape);
        ctx.fillStyle = state.bgColor;
        ctx.fillRect(0, 0, W, H);
        ctx.restore();

        // Layer 2: hand drawing (clipped to shape)
        ctx.save();
        ShapeRenderer.clipToShape(ctx, cx, cy, r, state.shape);
        ctx.drawImage(this.drawCanvas, 0, 0, W, H);
        ctx.restore();

        // Layer 3: emoji stamp at user-placed position
        if (state.stamp) {
          ctx.save();
          ShapeRenderer.clipToShape(ctx, cx, cy, r, state.shape);
          ctx.font = '72px serif';
          ctx.textAlign    = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(state.stamp, state.stampX, state.stampY);
          ctx.restore();
        }

        // Layer 4: text at user-placed position
        if (state.stickerText) {
          ctx.save();
          ShapeRenderer.clipToShape(ctx, cx, cy, r, state.shape);
          const fontSize = state.stickerText.length > 8 ? 18 : 26;
          ctx.font         = `bold ${fontSize}px "Hiragino Maru Gothic Pro", sans-serif`;
          ctx.textAlign    = 'center';
          ctx.textBaseline = 'middle';
          ctx.shadowColor  = 'rgba(0,0,0,0.55)';
          ctx.shadowBlur   = 8;
          ctx.fillStyle    = '#ffffff';
          ctx.fillText(state.stickerText, state.textX, state.textY);
          ctx.restore();
        }
      },
    };

    /* ===== MAKER UI ===== */

    const MakerUI = {
      init() {
        this._buildColorPalette();
        this._buildStampPicker();
        this._wireShapeButtons();
        this._wireTextInput();
        this._wireDrawTools();
        this._wireSaveButton();
      },

      _buildColorPalette() {
        const grid = document.getElementById('color-palette');
        COLOR_PALETTE.forEach((color, i) => {
          const btn = document.createElement('button');
          btn.className        = 'color-swatch' + (i === 0 ? ' active' : '');
          btn.style.background = color;
          btn.dataset.color    = color;
          btn.setAttribute('aria-label', color);
          if (color === '#ffffff' || color === '#f0f0f0') {
            btn.style.border = '3px solid #ccc';
          }
          btn.addEventListener('click', () => {
            state.bgColor = color;
            grid.querySelectorAll('.color-swatch').forEach(s =>
              s.classList.toggle('active', s.dataset.color === color)
            );
            PreviewRenderer.render();
          });
          grid.appendChild(btn);
        });
      },

      _buildStampPicker() {
        const row = document.getElementById('stamp-picker');

        const noneBtn = document.createElement('button');
        noneBtn.className = 'stamp-btn stamp-none active';
        noneBtn.textContent = '✕';
        noneBtn.setAttribute('aria-label', 'スタンプなし');
        noneBtn.addEventListener('click', () => {
          state.stamp = null;
          exitStampPlaceMode();
          row.querySelectorAll('.stamp-btn').forEach(b => b.classList.remove('active'));
          noneBtn.classList.add('active');
          document.getElementById('stamp-place-row').hidden = true;
          PreviewRenderer.render();
        });
        row.appendChild(noneBtn);

        STAMP_LIST.forEach(emoji => {
          const btn = document.createElement('button');
          btn.className   = 'stamp-btn';
          btn.textContent = emoji;
          btn.setAttribute('aria-label', emoji);
          btn.addEventListener('click', () => {
            state.stamp = emoji;
            state.stampX = 150;  // 新しいスタンプは中央にリセット
            state.stampY = 150;
            row.querySelectorAll('.stamp-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('stamp-place-row').hidden = false;
            PreviewRenderer.render();
          });
          row.appendChild(btn);
        });
      },

      _wireShapeButtons() {
        document.querySelectorAll('.shape-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            state.shape = btn.dataset.shape;
            document.querySelectorAll('.shape-btn').forEach(b =>
              b.classList.toggle('active', b === btn)
            );
            PreviewRenderer.render();
          });
        });
      },

      _wireTextInput() {
        const input      = document.getElementById('sticker-text');
        const placeRow   = document.getElementById('text-place-row');
        input.addEventListener('input', () => {
          state.stickerText = input.value;
          placeRow.hidden = !input.value;
          if (!input.value) exitTextPlaceMode();
          PreviewRenderer.render();
        });

        document.getElementById('btn-text-place').addEventListener('click', () => {
          state.textPlaceMode = !state.textPlaceMode;
          document.getElementById('btn-text-place').classList.toggle('active', state.textPlaceMode);
          document.getElementById('draw-canvas').classList.toggle('text-place-mode', state.textPlaceMode);
          if (state.textPlaceMode) {
            exitStampPlaceMode();
            state.eraserMode = false;
            document.getElementById('btn-eraser').classList.remove('active');
            document.getElementById('draw-canvas').classList.remove('eraser-mode');
            document.querySelectorAll('.pen-size-btn').forEach(b =>
              b.classList.toggle('active', parseInt(b.dataset.size, 10) === state.penSize)
            );
          }
        });
      },

      _wireDrawTools() {
        // ペンサイズ 3段階ボタン
        document.querySelectorAll('.pen-size-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            state.penSize    = parseInt(btn.dataset.size, 10);
            state.eraserMode = false;
            exitStampPlaceMode();
            exitTextPlaceMode();
            document.getElementById('btn-eraser').classList.remove('active');
            document.getElementById('draw-canvas').classList.remove('eraser-mode');
            document.querySelectorAll('.pen-size-btn').forEach(b =>
              b.classList.toggle('active', b === btn)
            );
          });
        });

        // 消しゴムトグル
        document.getElementById('btn-eraser').addEventListener('click', () => {
          exitStampPlaceMode();
          exitTextPlaceMode();
          state.eraserMode = !state.eraserMode;
          document.getElementById('btn-eraser').classList.toggle('active', state.eraserMode);
          document.getElementById('draw-canvas').classList.toggle('eraser-mode', state.eraserMode);
          if (state.eraserMode) {
            document.querySelectorAll('.pen-size-btn').forEach(b => b.classList.remove('active'));
          } else {
            document.querySelectorAll('.pen-size-btn').forEach(b =>
              b.classList.toggle('active', parseInt(b.dataset.size, 10) === state.penSize)
            );
          }
        });

        // スタンプ配置モードトグル
        document.getElementById('btn-stamp-place').addEventListener('click', () => {
          state.stampPlaceMode = !state.stampPlaceMode;
          document.getElementById('btn-stamp-place').classList.toggle('active', state.stampPlaceMode);
          document.getElementById('draw-canvas').classList.toggle('stamp-place-mode', state.stampPlaceMode);
          // 配置モードON時は消しゴム・ペンモードを解除
          if (state.stampPlaceMode) {
            state.eraserMode = false;
            document.getElementById('btn-eraser').classList.remove('active');
            document.getElementById('draw-canvas').classList.remove('eraser-mode');
            document.querySelectorAll('.pen-size-btn').forEach(b =>
              b.classList.toggle('active', parseInt(b.dataset.size, 10) === state.penSize)
            );
          }
        });

        // アンドゥ
        document.getElementById('btn-undo').addEventListener('click', () => DrawingPad.undo());

        // 全消し（確認ダイアログ付き）
        const clearDialog = document.getElementById('clear-confirm');
        document.getElementById('btn-clear-draw').addEventListener('click', () => {
          clearDialog.hidden = false;
        });
        document.getElementById('btn-clear-yes').addEventListener('click', () => {
          clearDialog.hidden = true;
          DrawingPad.clear();
        });
        document.getElementById('btn-clear-no').addEventListener('click', () => {
          clearDialog.hidden = true;
        });
        // ダイアログ外タップで閉じる
        document.addEventListener('pointerdown', e => {
          if (!clearDialog.hidden &&
              !clearDialog.contains(e.target) &&
              e.target !== document.getElementById('btn-clear-draw')) {
            clearDialog.hidden = true;
          }
        }, { capture: true });

        // ペン色スウォッチ構築
        buildDrawColorPalette();
      },

      _wireSaveButton() {
        document.getElementById('btn-save').addEventListener('click', () => {
          handleSave();
        });
      },
    };

    /* ===== HOME UI (Phase 2) ===== */

    const HomeUI = {
      _selectedId: null,

      init() {
        this._renderNotebook();
        this._buildStickerTray();
        document.getElementById('notebook-page').addEventListener('pointerdown', e => {
          if (e.target.id === 'notebook-page') this._deselect();
        });
      },

      // 手帳画面に切り替えたとき or 保存後にトレイを更新
      refresh() {
        this._buildStickerTray();
      },

      _renderNotebook() {
        const page = document.getElementById('notebook-page');
        page.innerHTML = '';
        PageStorage.getAll().forEach(item => this._createStickerEl(item));
      },

      _buildStickerTray() {
        const tray = document.getElementById('sticker-tray');
        tray.innerHTML = '';
        const stickers = StickerStorage.getAll();
        if (stickers.length === 0) {
          const msg = document.createElement('p');
          msg.className   = 'tray-empty';
          msg.textContent = 'まだシールがないよ！ ✏️ つくってみよう';
          tray.appendChild(msg);
          return;
        }
        stickers.forEach(s => {
          const img = document.createElement('img');
          img.className = 'tray-sticker';
          img.src = s.imageData;
          img.alt = 'シール';
          img.addEventListener('click', () => this._addStickerToPage(s.imageData));
          tray.appendChild(img);
        });
      },

      _addStickerToPage(imageData) {
        const page = document.getElementById('notebook-page');
        const W    = page.offsetWidth  || 300;
        const H    = page.offsetHeight || 400;
        const SIZE = 80;
        const pad  = 20;
        const x        = pad + Math.random() * Math.max(0, W - SIZE - pad * 2);
        const y        = pad + Math.random() * Math.max(0, H - SIZE - pad * 2);
        const rotation = Math.random() * 24 - 12;
        const item     = PageStorage.add(imageData, x, y, rotation);
        this._createStickerEl(item);
      },

      _createStickerEl(item) {
        const page   = document.getElementById('notebook-page');
        const wrap   = document.createElement('div');
        wrap.className       = 'placed-sticker';
        wrap.dataset.id      = item.id;
        wrap.style.left      = item.x + 'px';
        wrap.style.top       = item.y + 'px';
        wrap.style.transform = `rotate(${item.rotation || 0}deg)`;

        const img     = document.createElement('img');
        img.src       = item.imageData;
        img.alt       = 'シール';
        img.draggable = false;

        const delBtn       = document.createElement('button');
        delBtn.className   = 'placed-sticker-del';
        delBtn.textContent = '✕';
        delBtn.setAttribute('aria-label', 'シールをはがす');
        delBtn.addEventListener('pointerdown', e => {
          e.stopPropagation();
          PageStorage.remove(item.id);
          wrap.remove();
          if (this._selectedId === item.id) this._selectedId = null;
        });

        wrap.appendChild(img);
        wrap.appendChild(delBtn);
        page.appendChild(wrap);

        wrap.addEventListener('pointerdown', e => {
          if (e.target === delBtn) return;
          e.stopPropagation();
          this._select(item.id);
        });

        this._makeDraggable(wrap, item);
      },

      _select(id) {
        this._deselect();
        this._selectedId = id;
        const el = document.querySelector(`.placed-sticker[data-id="${id}"]`);
        if (el) el.classList.add('selected');
      },

      _deselect() {
        if (this._selectedId) {
          const el = document.querySelector(`.placed-sticker[data-id="${this._selectedId}"]`);
          if (el) el.classList.remove('selected');
          this._selectedId = null;
        }
      },

      _makeDraggable(el, item) {
        let dragging = false, moved = false, startX, startY, baseX, baseY;

        el.addEventListener('pointerdown', e => {
          if (e.target.classList.contains('placed-sticker-del')) return;
          dragging = true;
          moved    = false;
          el.setPointerCapture(e.pointerId);
          startX = e.clientX;
          startY = e.clientY;
          baseX  = parseFloat(el.style.left) || 0;
          baseY  = parseFloat(el.style.top)  || 0;
          el.style.zIndex = '10';
        });

        el.addEventListener('pointermove', e => {
          if (!dragging) return;
          const dx = e.clientX - startX;
          const dy = e.clientY - startY;
          if (Math.abs(dx) > 5 || Math.abs(dy) > 5) moved = true;
          if (!moved) return;
          const page = document.getElementById('notebook-page');
          const SIZE = 80;
          el.style.left = Math.max(0, Math.min(page.offsetWidth  - SIZE, baseX + dx)) + 'px';
          el.style.top  = Math.max(0, Math.min(page.offsetHeight - SIZE, baseY + dy)) + 'px';
        });

        el.addEventListener('pointerup', () => {
          if (!dragging) return;
          dragging = false;
          el.style.zIndex = '';
          if (moved) {
            const x = parseFloat(el.style.left) || 0;
            const y = parseFloat(el.style.top)  || 0;
            PageStorage.updatePos(item.id, x, y);
          }
        });

        el.addEventListener('pointercancel', () => {
          dragging = false;
          el.style.zIndex = '';
        });
      },
    };

    /* ===== COLLECTION UI (Phase 3) ===== */

    const CollectionUI = {
      _selectedId:      null,
      _pendingDeleteId: null,

      init() {
        document.getElementById('collection-delete-yes').addEventListener('click', () => {
          if (this._pendingDeleteId) {
            StickerStorage.delete(this._pendingDeleteId);
            this._pendingDeleteId = null;
            HomeUI.refresh();
          }
          document.getElementById('collection-delete-dialog').hidden = true;
          this.refresh();
        });

        document.getElementById('collection-delete-no').addEventListener('click', () => {
          this._pendingDeleteId = null;
          document.getElementById('collection-delete-dialog').hidden = true;
          this._deselect();
        });

        document.getElementById('collection-delete-dialog').addEventListener('pointerdown', e => {
          if (e.target === e.currentTarget) {
            this._pendingDeleteId = null;
            e.currentTarget.hidden = true;
            this._deselect();
          }
        });
      },

      refresh() {
        this._selectedId = null;
        this._buildGrid();
      },

      _buildGrid() {
        const grid  = document.getElementById('collection-grid');
        const empty = document.getElementById('collection-empty');
        grid.innerHTML = '';
        const stickers = StickerStorage.getAll();

        if (stickers.length === 0) {
          empty.hidden = false;
          return;
        }
        empty.hidden = true;

        stickers.forEach(s => {
          const wrap   = document.createElement('div');
          wrap.className  = 'collection-sticker';
          wrap.dataset.id = s.id;

          const img = document.createElement('img');
          img.src = s.imageData;
          img.alt = 'シール';

          const delBtn       = document.createElement('button');
          delBtn.className   = 'collection-sticker-del';
          delBtn.textContent = '✕';
          delBtn.setAttribute('aria-label', 'シールをけす');
          delBtn.addEventListener('pointerdown', e => {
            e.stopPropagation();
            this._confirmDelete(s.id, s.imageData);
          });

          wrap.appendChild(img);
          wrap.appendChild(delBtn);
          grid.appendChild(wrap);

          wrap.addEventListener('click', () => {
            this._selectedId === s.id ? this._deselect() : this._select(s.id);
          });
        });
      },

      _select(id) {
        this._deselect();
        this._selectedId = id;
        const el = document.querySelector(`.collection-sticker[data-id="${id}"]`);
        if (el) el.classList.add('selected');
      },

      _deselect() {
        if (this._selectedId) {
          const el = document.querySelector(`.collection-sticker[data-id="${this._selectedId}"]`);
          if (el) el.classList.remove('selected');
          this._selectedId = null;
        }
      },

      _confirmDelete(id, imageData) {
        this._pendingDeleteId = id;
        document.getElementById('collection-dialog-img').src = imageData;
        document.getElementById('collection-delete-dialog').hidden = false;
      },
    };

    /* ===== APP SHELL ===== */

    const AppShell = {
      init() {
        document.querySelectorAll('.nav-btn').forEach(btn => {
          btn.addEventListener('click', () => showScreen(btn.dataset.target));
        });
        showScreen('maker');
      },
    };

    /* ===== HELPERS ===== */

    // ペン色スウォッチを動的生成（COLOR_PALETTEのパターンを流用）
    function buildDrawColorPalette() {
      const row = document.getElementById('draw-color-palette');
      PEN_COLORS.forEach((color, i) => {
        const btn = document.createElement('button');
        btn.className     = 'color-swatch' + (i === 0 ? ' active' : '');
        btn.style.background = color;
        btn.dataset.color = color;
        btn.setAttribute('aria-label', 'ペンのいろ');
        if (color === '#ffffff' || color === '#f0f0f0') {
          btn.style.border = '3px solid #ccc';
        }
        btn.addEventListener('click', () => {
          state.penColor   = color;
          state.eraserMode = false;
          document.getElementById('btn-eraser').classList.remove('active');
          document.getElementById('draw-canvas').classList.remove('eraser-mode');
          // 消しゴムOFF時はサイズボタンを再アクティブ
          document.querySelectorAll('.pen-size-btn').forEach(b =>
            b.classList.toggle('active', parseInt(b.dataset.size, 10) === state.penSize)
          );
          row.querySelectorAll('.color-swatch').forEach(s =>
            s.classList.toggle('active', s.dataset.color === color)
          );
        });
        row.appendChild(btn);
      });
    }

    // スタンプ配置モードを解除
    function exitStampPlaceMode() {
      state.stampPlaceMode = false;
      const btn = document.getElementById('btn-stamp-place');
      if (btn) btn.classList.remove('active');
      document.getElementById('draw-canvas').classList.remove('stamp-place-mode');
    }

    // テキスト配置モードを解除
    function exitTextPlaceMode() {
      state.textPlaceMode = false;
      const btn = document.getElementById('btn-text-place');
      if (btn) btn.classList.remove('active');
      document.getElementById('draw-canvas').classList.remove('text-place-mode');
    }

    // アンドゥ/リドゥボタンの有効・無効を更新
    function updateUndoRedoButtons() {
      const undoBtn = document.getElementById('btn-undo');
      if (undoBtn) undoBtn.disabled = state.undoStack.length === 0;
    }

    function showScreen(name) {
      document.body.dataset.screen = name;
      document.querySelectorAll('.nav-btn').forEach(btn =>
        btn.classList.toggle('active', btn.dataset.target === name)
      );
      if (name === 'home')       HomeUI.refresh();
      if (name === 'collection') CollectionUI.refresh();
    }

    function handleSave() {
      const final = document.createElement('canvas');
      final.width  = 300;
      final.height = 300;
      final.getContext('2d').drawImage(PreviewRenderer.canvas, 0, 0);
      const imageData = final.toDataURL('image/png');

      const sticker = StickerStorage.save(imageData);
      if (!sticker) {
        showSaveError();
        return;
      }

      HomeUI.refresh();
      CollectionUI.refresh();
      showSaveSuccess(sticker);
    }

    function showSaveError() {
      const overlay = document.createElement('div');
      overlay.className = 'save-success-overlay';
      overlay.innerHTML = `<p style="font-size:1.2rem">⚠️ いっぱいになったよ！<br>古いシールをけしてね</p>`;
      overlay.addEventListener('click', () => overlay.remove());
      document.body.appendChild(overlay);
      setTimeout(() => overlay.remove(), 2500);
    }

    function showSaveSuccess(sticker) {
      const overlay = document.createElement('div');
      overlay.className = 'save-success-overlay';
      overlay.innerHTML = `
        <img src="${sticker.imageData}" class="success-img" alt="保存したシール">
        <p>シールにしたよ！🎉</p>
      `;
      overlay.addEventListener('click', () => overlay.remove());
      document.body.appendChild(overlay);
      setTimeout(() => overlay.remove(), 1800);
    }

    /* ===== INIT ===== */

    document.addEventListener('DOMContentLoaded', () => {
      AppShell.init();
      PreviewRenderer.init();
      DrawingPad.init();
      MakerUI.init();
      HomeUI.init();
      CollectionUI.init();
      PreviewRenderer.render();
    });
  </script>
</body>
</html>
